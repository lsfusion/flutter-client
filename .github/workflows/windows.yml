name: Windows Build

on:
#  push:
#    branches: [ main ]
#  pull_request:
  workflow_dispatch:
  workflow_call:

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: flutter-actions/setup-flutter@v4
        with:
          channel: stable
          version: latest

      - name: Install dependencies
        run: flutter pub get

#      - name: Build Windows app
#        run: flutter build windows --release

      - name: Create MSIX Installer
        run: dart run msix:create
        shell: pwsh

      - name: Verify signtool exists
        run: |
          $signtool = "C:\Program Files (x86)\Windows Kits\10\bin\10.0.26100.0\x64\signtool.exe"
          if (Test-Path $signtool) {
            Write-Host "Signtool found at $signtool"
          } else {
            Write-Host "Signtool NOT found at $signtool. Searching..."
            $found = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits" -Filter "signtool.exe" -Recurse | Select-Object -First 1
            if ($found) {
                Write-Host "Found at: $($found.FullName)"
            } else {
                throw "signtool.exe not found anywhere in Windows Kits"
            }
          }
        shell: pwsh

      - name: Setup eSigner CKA
        run: |
          $url = "https://www.ssl.com/download/ssl-com-esigner-cka/"
          curl.exe -L $url -o eSignerCKA_Setup.zip
          Expand-Archive -Path eSignerCKA_Setup.zip -DestinationPath eSignerCKA_Setup
          
          # The zip contains an EXE, not an MSI directly
          $exePath = Get-ChildItem -Path eSignerCKA_Setup -Filter "*.exe" -Recurse | Select-Object -First 1
          if ($null -eq $exePath) { throw "eSignerCKA EXE not found." }
          
          # Run the EXE installer silently
          Write-Host "Installing $($exePath.FullName)..."
          $process = Start-Process -FilePath $exePath.FullName -ArgumentList "/VERYSILENT", "/SUPPRESSMSGBOXES", "/NORESTART", "/SP-", "/LOG=install.log" -PassThru -Wait
          
          if (Test-Path "install.log") {
            Get-Content "install.log" | Select-Object -Last 20
          }
          
          # Add eSignerCKA to PATH
          $ckaPath = "C:\Program Files (x86)\SSL Corp eSigner CKA"
          
          if (!(Test-Path $ckaPath)) {
            $ckaPath = "C:\Program Files\SSL Corp eSigner CKA"
          }
          
          if (!(Test-Path $ckaPath)) {
            Write-Host "Standard path not found. Searching for SSL folders..."
            $ckaPath = Get-ChildItem -Path "C:\Program Files (x86)", "C:\Program Files" -Filter "*SSL Corp*" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1 -ExpandProperty FullName
          }

          if ($ckaPath -and (Test-Path $ckaPath)) {
            Write-Host "eSignerCKA installed at $ckaPath"
            Write-Host "Listing files in $ckaPath recursively:"
            Get-ChildItem -Path $ckaPath -Recurse | Select-Object FullName, Length
            echo "$ckaPath" >> $env:GITHUB_PATH
          } else {
            # Debug: show where it might have been installed
            Write-Host "Search failed. Listing possible parent directories..."
            Get-ChildItem -Path "C:\Program Files (x86)", "C:\Program Files" -Filter "*SSL*" | Select-Object FullName
            throw "eSignerCKA installation failed. Directory not found."
          }
        shell: pwsh

      - name: Sign MSIX with eSigner CKA
        run: |
          # Find signtool
          $signtool = "C:\Program Files (x86)\Windows Kits\10\bin\10.0.26100.0\x64\signtool.exe"
          if (!(Test-Path $signtool)) {
            $signtool = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits" -Filter "signtool.exe" -Recurse | Select-Object -First 1 -ExpandProperty FullName
          }
          if ($null -eq $signtool -or $signtool -eq "") {
            throw "signtool.exe could not be located."
          }
          Write-Host "Using signtool: $signtool"

          # Find eSignerCKA
          # We check several possible locations based on logs
          $possiblePaths = @(
            "C:\Program Files (x86)\SSL Corp eSigner CKA\eSigner CKA.exe",
            "C:\Program Files (x86)\SSL Corp eSigner CKA\eSignerCKA.exe",
            "C:\Program Files\SSL Corp eSigner CKA\eSignerCKA.exe",
            "C:\Program Files (x86)\SSL.com\eSignerCKA\eSignerCKA.exe"
          )
  
          $ckaExe = $null
          foreach ($path in $possiblePaths) {
            if (Test-Path $path) {
              $ckaExe = $path
              break
            }
          }
  
          if ($null -eq $ckaExe) {
            Write-Host "eSignerCKA.exe not found at known paths. Searching for ANY .exe in SSL Corp folder..."
            $ckaExe = Get-ChildItem -Path "C:\Program Files (x86)\SSL Corp*" -Filter "*.exe" -Recurse -ErrorAction SilentlyContinue | Where-Object { $_.Name -like "*eSigner*" } | Select-Object -First 1 -ExpandProperty FullName
          }
  
          if ($null -eq $ckaExe -or $ckaExe -eq "") {
            Write-Host "Still not found. Searching for ANY .exe in all SSL-related folders..."
            $ckaExe = Get-ChildItem -Path "C:\Program Files (x86)", "C:\Program Files" -Filter "*.exe" -Recurse -ErrorAction SilentlyContinue | Where-Object { $_.FullName -like "*SSL*" -and $_.Name -like "*eSigner*" } | Select-Object -First 1 -ExpandProperty FullName
          }

          if ($null -eq $ckaExe -or $ckaExe -eq "") {
            Write-Host "DEBUG: Listing ALL files in SSL Corp directory if it exists..."
            if (Test-Path "C:\Program Files (x86)\SSL Corp eSigner CKA") {
               Get-ChildItem -Path "C:\Program Files (x86)\SSL Corp eSigner CKA" -Recurse | Select-Object FullName
            }
            throw "eSignerCKA executable could not be located."
          }
          
          # Rename the executable to remove spaces, which can cause issues with some command parsers
          $ckaDir = Split-Path $ckaExe
          $ckaShortExe = Join-Path $ckaDir "eSignerCKA.exe"
          if (!(Test-Path $ckaShortExe)) {
            Write-Host "Renaming '$ckaExe' to '$ckaShortExe'..."
            Move-Item "$ckaExe" "$ckaShortExe" -Force
          }
          $ckaExe = $ckaShortExe
          Write-Host "Using eSignerCKA: $ckaExe"
          
          # Config
          Write-Host "Configuring eSignerCKA..."
          & "$ckaExe" config -mode manual -set_path "$signtool"
          Write-Host "Config completed."
          
          # Attempt Login
          Write-Host "Checking secrets availability..."
          if ([string]::IsNullOrWhiteSpace("${{ secrets.SS_USER_NAME }}")) { throw "SS_USER_NAME is missing" }
          if ([string]::IsNullOrWhiteSpace("${{ secrets.SS_USER_PASSWORD }}")) { throw "SS_USER_PASSWORD is missing" }
          if ([string]::IsNullOrWhiteSpace("${{ secrets.SS_CREDENTIAL_ID }}")) { throw "SS_CREDENTIAL_ID is missing" }
          if ([string]::IsNullOrWhiteSpace("${{ secrets.SS_TOTP_SECRET }}")) { throw "SS_TOTP_SECRET is missing" }

          Write-Host "Attempting login with eSignerCKA..."
          # Using a single line to avoid any backtick/line-ending issues in CI
          & "$ckaExe" login -username "${{ secrets.SS_USER_NAME }}" -password "${{ secrets.SS_USER_PASSWORD }}" -credential_id "${{ secrets.SS_CREDENTIAL_ID }}" -totp_secret "${{ secrets.SS_TOTP_SECRET }}" -save
          
          $loginResult = $LASTEXITCODE
          Write-Host "Login result code: $loginResult"
          
          if ($loginResult -ne 0) {
            Write-Host "Login via eSignerCKA failed ($loginResult). Trying eSignerCKATool.exe as fallback..."
            $ckaTool = Join-Path $ckaDir "eSignerCKATool.exe"
            if (Test-Path $ckaTool) {
               & "$ckaTool" login -username "${{ secrets.SS_USER_NAME }}" -password "${{ secrets.SS_USER_PASSWORD }}" -credential_id "${{ secrets.SS_CREDENTIAL_ID }}" -totp_secret "${{ secrets.SS_TOTP_SECRET }}" -save
               $loginResult = $LASTEXITCODE
               Write-Host "Fallback login result code: $loginResult"
            }
          }
          
          if ($loginResult -ne 0) {
            Write-Host "Login failed. Attempting to get help from both tools..."
            & "$ckaExe" --help
            $ckaTool = Join-Path $ckaDir "eSignerCKATool.exe"
            if (Test-Path $ckaTool) { & "$ckaTool" --help }
            throw "Login failed with exit code $loginResult."
          }
          Write-Host "Login completed successfully."

          # Check if eSignerCKATool exists and can show info
          $ckaTool = Join-Path $ckaDir "eSignerCKATool.exe"
          if (Test-Path $ckaTool) {
            Write-Host "Running eSignerCKATool for diagnostics..."
            & "$ckaTool" certificates
          }

          # Important: Wait a few seconds for the certificate to be propagated to the store
          Write-Host "Waiting for certificate propagation..."
          Start-Sleep -Seconds 15

          # Debug: List certificates immediately after login
          Write-Host "Listing ALL certificates in My store after login..."
          Get-ChildItem -Path Cert:\CurrentUser\My | Select-Object Subject, Issuer, Thumbprint, EnhancedKeyUsageList | Format-List
          
          $msixPath = Get-ChildItem -Path build/windows/x64/runner/Release/*.msix | Select-Object -First 1
          if ($null -eq $msixPath) { throw "MSIX file not found." }
          $absoluteMsixPath = $msixPath.FullName
          
          $absoluteOutputDir = Join-Path (Get-Location).Path "build/windows/x64/runner/Release/signed"
          if (!(Test-Path $absoluteOutputDir)) { New-Item -ItemType Directory -Force -Path $absoluteOutputDir }
          $signedMsixPath = Join-Path $absoluteOutputDir $msixPath.Name
          
          # Copy to signed dir first because signtool signs in-place
          Copy-Item -Path $absoluteMsixPath -Destination $signedMsixPath
          
          # Sign with signtool
          # We search for certificates that match SSL.com
          $cert = Get-ChildItem -Path Cert:\CurrentUser\My | Where-Object { 
            ($_.Issuer -like "*SSL Corp*" -or $_.Issuer -like "*SSL.com*" -or $_.Subject -like "*SSL.com*")
          } | Select-Object -First 1

          if ($cert) {
            Write-Host "Found matching certificate: $($cert.Subject) ($($cert.Thumbprint))"
            & "$signtool" sign /debug /sha1 "$($cert.Thumbprint)" /fd sha256 /tr http://ts.ssl.com /td sha256 /csp "SSL.com KSP" /kc "${{ secrets.SS_CREDENTIAL_ID }}" /sm "$signedMsixPath"
          } else {
            Write-Host "Target certificate (SSL.com) NOT found in store."
            Write-Host "Falling back to /a with explicit KSP filter as a last resort..."
            & "$signtool" sign /debug /a /fd sha256 /tr http://ts.ssl.com /td sha256 /csp "SSL.com KSP" /kc "${{ secrets.SS_CREDENTIAL_ID }}" /sm "$signedMsixPath"
          }
          
          # Logout
          & "$ckaExe" logout
        shell: pwsh

      - name: List Certificates (Debug)
        if: always()
        run: |
          Get-ChildItem -Path Cert:\CurrentUser\My | Select-Object Subject, Issuer, Thumbprint, EnhancedKeyUsageList | Format-List
        shell: pwsh

      - name: Upload Windows build
        uses: actions/upload-artifact@v4
        with:
          name: windows-msix
          path: |
            build/windows/x64/runner/Release/*.msix
            build/windows/x64/runner/Release/signed/*.msix