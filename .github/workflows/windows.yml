name: Windows Build

on:
#  push:
#    branches: [ main ]
#  pull_request:
  workflow_dispatch:
  workflow_call:

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: flutter-actions/setup-flutter@v4
        with:
          channel: stable
          version: latest

      - name: Install dependencies
        run: flutter pub get

#      - name: Build Windows app
#        run: flutter build windows --release

      - name: Create MSIX Installer
        run: dart run msix:create
        shell: pwsh

      - name: Verify signtool exists
        run: |
          $signtool = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits" -Filter "signtool.exe" -Recurse | Where-Object { $_.FullName -like "*\x86\*" } | Select-Object -First 1 -ExpandProperty FullName
          if (!$signtool) {
            $signtool = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits" -Filter "signtool.exe" -Recurse | Select-Object -First 1 -ExpandProperty FullName
          }
          if ($signtool) {
            Write-Host "Signtool found at $signtool"
            "SIGNTOOL_PATH=$signtool" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          } else {
            throw "signtool.exe not found anywhere in Windows Kits"
          }
        shell: pwsh

      - name: Setup eSigner CKA
        run: |
          $url = "https://www.ssl.com/download/ssl-com-esigner-cka/"
          curl.exe -L $url -o eSignerCKA_Setup.zip
          Expand-Archive -Path eSignerCKA_Setup.zip -DestinationPath eSignerCKA_Setup
          
          $exePath = Get-ChildItem -Path eSignerCKA_Setup -Filter "*.exe" -Recurse | Select-Object -First 1
          if ($null -eq $exePath) { throw "eSignerCKA EXE not found." }
          
          Write-Host "Installing eSigner CKA..."
          Start-Process -FilePath $exePath.FullName -ArgumentList "/VERYSILENT", "/SUPPRESSMSGBOXES", "/NORESTART", "/SP-", "/LOG=install.log" -Wait
          
          $ckaPath = "C:\Program Files (x86)\SSL Corp eSigner CKA"
          if (!(Test-Path $ckaPath)) {
            $ckaPath = Get-ChildItem -Path "C:\Program Files (x86)", "C:\Program Files" -Filter "*SSL Corp*" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1 -ExpandProperty FullName
          }
          
          if ($ckaPath -and (Test-Path $ckaPath)) {
            # Rename for easy use in command line
            if (Test-Path "$ckaPath\eSigner CKA.exe") {
              Move-Item "$ckaPath\eSigner CKA.exe" "$ckaPath\eSignerCKA.exe" -Force
            }
            Write-Host "eSignerCKA installed at $ckaPath"
            echo "$ckaPath" >> $env:GITHUB_PATH
          } else {
            throw "eSignerCKA installation failed. Directory not found."
          }
        shell: pwsh

      - name: Sign MSIX with eSigner CKA
        run: |
          # 1. Path Setup
          $signtool = "${{ env.SIGNTOOL_PATH }}"
          Write-Host "Using signtool: $signtool"

          $ckaDir = "C:\Program Files (x86)\SSL Corp eSigner CKA"
          $ckaTool = Join-Path $ckaDir "eSignerCKATool.exe"
          $masterKey = Join-Path $env:GITHUB_WORKSPACE "master.key"

          # 2. Config
          # Correcting parameters according to SSL.com guide: -pass is Password, -totp is TOTP Secret
          Write-Host "Configuring eSignerCKATool..."
          & "$ckaTool" config -mode product -user "${{ secrets.SS_USER_NAME }}" -pass "${{ secrets.SS_USER_PASSWORD }}" -totp "${{ secrets.SS_TOTP_SECRET }}" -key "$masterKey" -r
          
          # 3. Load certificates
          Write-Host "Refreshing certificates..."
          & "$ckaTool" unload
          & "$ckaTool" load
          
          # 4. Get thumbprint dynamically
          $cert = Get-ChildItem Cert:\CurrentUser\My | Where-Object { $_.Issuer -like "*SSL*" -or $_.Subject -like "*Aliaksei*" } | Select-Object -First 1
          if (!$cert) { throw "Certificate not found in store after load." }
          $thumbprint = $cert.Thumbprint
          Write-Host "Using THUMBPRINT=$thumbprint"

          # 5. Prepare file
          $msixPath = Get-ChildItem -Path build/windows/x64/runner/Release/*.msix | Select-Object -First 1
          $signedMsixPath = "build/windows/x64/runner/Release/signed/$($msixPath.Name)"
          if (!(Test-Path (Split-Path $signedMsixPath))) { New-Item -ItemType Directory -Force -Path (Split-Path $signedMsixPath) }
          Copy-Item -Path $msixPath.FullName -Destination $signedMsixPath
          
          # 6. Malware Scan (Required by SSL.com if enabled on account)
          Write-Host "Scanning for malware..."
          & "$ckaTool" scan -file "$signedMsixPath"

          # 7. Sign
          Write-Host "Signing..."
          & "$signtool" sign /v /debug /fd sha256 /tr http://ts.ssl.com /td sha256 /csp "eSignerKSP" /kc "${{ secrets.SS_CREDENTIAL_ID }}" /sha1 "$thumbprint" "$signedMsixPath"
          
          # 8. Cleanup
          & "$ckaTool" unload
        shell: pwsh

      - name: List Certificates (Debug)
        if: always()
        run: |
          Get-ChildItem -Path Cert:\CurrentUser\My | Select-Object Subject, Issuer, Thumbprint, EnhancedKeyUsageList | Format-List
        shell: pwsh

      - name: Upload Windows build
        uses: actions/upload-artifact@v4
        with:
          name: windows-msix
          path: |
            build/windows/x64/runner/Release/*.msix
            build/windows/x64/runner/Release/signed/*.msix