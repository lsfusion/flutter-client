name: Windows Build

on:
  #  push:
  #    branches: [ main ]
  #  pull_request:
  workflow_dispatch:
  workflow_call:

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: flutter-actions/setup-flutter@v4
        with:
          channel: stable
          version: latest

      - name: Install dependencies
        run: flutter pub get
      
      #      - name: Build Windows app
      #        run: flutter build windows --release

      - name: Create MSIX Installer
        run: dart run msix:create
        shell: pwsh

      - name: Setup signtool
        run: |
          $kitPath = "C:\Program Files (x86)\Windows Kits\10\bin"
          $signtool = Get-ChildItem -Path $kitPath -Filter "signtool.exe" -Recurse | Where-Object { $_.FullName -like "*\x86\*" } | Sort-Object FullName -Descending | Select-Object -First 1
          if ($null -eq $signtool) { throw "signtool.exe not found" }
          Write-Host "Using signtool: $($signtool.FullName)"
          echo "SIGNTOOL_PATH=$($signtool.FullName)" >> $env:GITHUB_ENV
        shell: pwsh

      - name: Setup eSigner CKA
        run: |
          $url = "https://www.ssl.com/download/ssl-com-esigner-cka/"
          curl.exe -L $url -o eSignerCKA_Setup.zip
          Expand-Archive -Path eSignerCKA_Setup.zip -DestinationPath eSignerCKA_Setup
          $exePath = Get-ChildItem -Path eSignerCKA_Setup -Filter "*.exe" -Recurse | Select-Object -First 1
          
          Write-Host "Installing eSigner CKA..."
          Start-Process -FilePath $exePath.FullName -ArgumentList "/VERYSILENT", "/SUPPRESSMSGBOXES", "/NORESTART", "/SP-", "/LOG=install.log" -Wait
          
          $ckaPath = "C:\Program Files (x86)\SSL Corp eSigner CKA"
          if (!(Test-Path $ckaPath)) {
            $ckaPath = Get-ChildItem -Path "C:\Program Files (x86)" -Filter "SSL Corp eSigner CKA" -Directory -Recurse | Select-Object -First 1 -ExpandProperty FullName
          }
          
          if ($null -eq $ckaPath) { throw "eSignerCKA installation failed" }
          
          # Rename for easy use in command line
          if (Test-Path "$ckaPath\eSigner CKA.exe") {
            Move-Item "$ckaPath\eSigner CKA.exe" "$ckaPath\eSignerCKA.exe" -Force
          }
          Write-Host "eSignerCKA installed at $ckaPath"
          echo "$ckaPath" >> $env:GITHUB_PATH
          echo "CKA_DIR=$ckaPath" >> $env:GITHUB_ENV
        shell: pwsh

      - name: Sign MSIX with eSigner CKA
        run: |
          $ckaTool = Join-Path "$env:CKA_DIR" "eSignerCKATool.exe"
          $masterKey = "C:\master.key"

          Write-Host "Configuring eSignerCKATool..."
          & "$ckaTool" config -mode product -user "${{ secrets.SS_USER_NAME }}" -pass "${{ secrets.SS_USER_PASSWORD }}" -totp "${{ secrets.SS_TOTP_SECRET }}" -key "$masterKey" -r
          
          # Refresh certificates as per guide
          & "$ckaTool" unload
          & "$ckaTool" load
          
          $CodeSigningCert = Get-ChildItem Cert:\CurrentUser\My -CodeSigningCert | Where-Object { $_.Issuer -like "*SSL.com Code Signing*" } | Select-Object -First 1
          if ($null -eq $CodeSigningCert) { throw "Certificate not found." }
          
          $msixPath = Get-ChildItem -Path build/windows/x64/runner/Release/*.msix | Select-Object -First 1
          $signedDir = "build/windows/x64/runner/Release/signed"
          if (!(Test-Path $signedDir)) { New-Item -ItemType Directory -Force -Path $signedDir }
          $signedMsixPath = Join-Path $signedDir $msixPath.Name
          
          # Sign
          & "$env:SIGNTOOL_PATH" sign /fd sha256 /tr http://ts.ssl.com /td sha256 /sha1 "$($CodeSigningCert.Thumbprint)" "$($msixPath.FullName)"
          
          # Move to signed folder for artifact upload
          Move-Item -Path "$($msixPath.FullName)" -Destination "$signedMsixPath" -Force
          
          # Cleanup
          & "$ckaTool" unload
        shell: pwsh

      - name: Rename Signed File and Generate AppInstaller
        run: |
          # 1. Извлекаем версию (ожидаем только цифры и точки, например 1.0.0)
          $pubspecContent = Get-Content pubspec.yaml -Raw
          $finalVersion = ([regex]::Match($pubspecContent, '(?m)^version:\s*([\d\.]+)').Groups[1].Value).Trim()
          
          # Приводим к стандарту Windows (4 части), если в pubspec только 3 (например, 1.0.0 -> 1.0.0.0)
          $vParts = $finalVersion.Split('.')
          while ($vParts.Count -lt 4) { $vParts += "0" }
          $finalVersion = ($vParts[0..3]) -join '.'
          
          Write-Host "Version used: $finalVersion"
          
          $signedDir = "build/windows/x64/runner/Release/signed"
          $msixFile = Get-ChildItem -Path "$signedDir/*.msix" | Select-Object -First 1
          if ($null -eq $msixFile) { 
            throw "MSIX file not found in $signedDir!" 
          }
          $newName = "flutter-client-$finalVersion.msix"
          $finalMsixPath = Join-Path $signedDir $newName
          # Переименовываем файл
          Move-Item -Path $msixFile.FullName -Destination $finalMsixPath -Force
          Write-Host "Signed file renamed to: $newName in folder $signedDir"
          Copy-Item -Path $finalMsixPath -Destination "."
          
          (Get-Content windows/flutter-client.appinstaller.template) `
            -replace '\$\{VERSION\}', $finalVersion `
            -replace '\$\{MSIX_NAME\}', $newName `
            | Out-File -FilePath flutter-client.appinstaller -Encoding utf8
          
          Write-Host "AppInstaller generated for version: $finalVersion"
        shell: pwsh

      - name: Upload Windows build
        uses: actions/upload-artifact@v4
        with:
          name: windows-msix
          path: |
            flutter-client-*.msix
            flutter-client.appinstaller