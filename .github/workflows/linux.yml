name: Linux Build

on:
#  push:
#    branches: [ main ]
#  pull_request:
  workflow_dispatch:
  workflow_call:

jobs:
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: flutter-actions/setup-flutter@v4
        with:
          channel: stable
          version: latest

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            ninja-build \
            pkg-config \
            libgtk-3-dev \
            liblzma-dev \
            libappindicator3-dev \
            rpm \
            file

      - name: Install dependencies
        run: |
          flutter pub get
          dart pub global activate fastforge

      - name: Patch flutter_app_packager (AppImage race condition fix)
        run: |
          # Try to find the file in common locations
          SEARCH_PATHS="$HOME/.pub-cache /home/runner/.pub-cache /opt/hostedtoolcache/flutter"
          FILE=""
          for path in $SEARCH_PATHS; do
            if [ -d "$path" ]; then
              FOUND=$(find "$path" -name app_package_maker_appimage.dart | grep flutter_app_packager | head -n 1)
              if [ -n "$FOUND" ]; then
                FILE="$FOUND"
                break
              fi
            fi
          done

          # If still not found, try a global find (slower but sure)
          if [ -z "$FILE" ]; then
            FILE=$(find / -name app_package_maker_appimage.dart 2>/dev/null | grep flutter_app_packager | head -n 1)
          fi

          if [ -n "$FILE" ]; then
            echo "Patching $FILE"
            # Add common system libraries to defaultSharedObjects to avoid parallel cp conflicts and bundling issues
            sed -i "s/'libgtk-3.so.0',/'libgtk-3.so.0', 'libstdc++.so.6', 'libgcc_s.so.1',/" "$FILE"
          else
            echo "flutter_app_packager not found"
            # List some directories to help debug if it fails again
            ls -R $HOME/.pub-cache 2>/dev/null | head -n 20 || echo "No $HOME/.pub-cache"
            exit 1
          fi

      - name: Build Linux packages
        run: |
          export PATH="$PATH:$HOME/.pub-cache/bin"
          fastforge package --platform linux --targets appimage,deb,rpm

      - name: Prepare and rename artifacts
        run: |
          VERSION=$(grep 'version:' pubspec.yaml | sed 's/version: //')
          mkdir deploy_out
          
          # AppImage
          APPIMAGE_FILE=$(find dist/ -name "*.AppImage" | head -n 1)
          if [ -f "$APPIMAGE_FILE" ]; then
            cp "$APPIMAGE_FILE" "deploy_out/flutter-client-$VERSION.AppImage"
          fi
          
          # DEB
          DEB_FILE=$(find dist/ -name "*.deb" | head -n 1)
          if [ -f "$DEB_FILE" ]; then
            cp "$DEB_FILE" "deploy_out/flutter-client-$VERSION.deb"
          fi
          
          # RPM
          RPM_FILE=$(find dist/ -name "*.rpm" | head -n 1)
          if [ -f "$RPM_FILE" ]; then
            cp "$RPM_FILE" "deploy_out/flutter-client-$VERSION.rpm"
          fi

      - name: Upload to CDN via SFTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USERNAME }}
          password: ${{ secrets.SFTP_PASSWORD }}
          port: 21
          protocol: ftp
          server-dir: flutter/linux/
          local-dir: ./deploy_out/

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: deploy_out/*