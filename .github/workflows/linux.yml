name: Linux Build

on:
#  push:
#    branches: [ main ]
#  pull_request:
  workflow_dispatch:
  workflow_call:

jobs:
  build-linux:
    name: Build Linux
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: flutter-actions/setup-flutter@v4
        with:
          channel: stable
          version: latest

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            ninja-build \
            pkg-config \
            libgtk-3-dev \
            liblzma-dev \
            libwebkit2gtk-4.0-dev \
            libappindicator3-dev \
            rpm \
            file

      - name: Install dependencies
        run: |
          flutter pub get
          dart pub global activate fastforge

      - name: Build Linux packages
        run: |
          export PATH="$PATH:$HOME/.pub-cache/bin"
          fastforge package --platform linux --targets deb,rpm

      - name: Prepare and rename artifacts
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | cut -d ' ' -f 2)
          mkdir deploy_out
          
          # DEB
          DEB_FILE=$(find dist/ -name "*.deb" | head -n 1)
          if [ -f "$DEB_FILE" ]; then
            cp "$DEB_FILE" "deploy_out/flutter-client-$VERSION.deb"
          fi
          
          # RPM
          RPM_FILE=$(find dist/ -name "*.rpm" | head -n 1)
          if [ -f "$RPM_FILE" ]; then
            cp "$RPM_FILE" "deploy_out/flutter-client-$VERSION.rpm"
          fi

      - name: Upload to CDN via FTP
        uses: sand4rt/ftp-deployer@v1.8
        with:
          host: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USERNAME }}
          password: ${{ secrets.SFTP_PASSWORD }}
          local_folder: deploy_out/
          remote_folder: flutter/linux/
          cleanup: false

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: deploy_out/*