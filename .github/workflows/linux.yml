name: Linux Build

on:
#  push:
#    branches: [ main ]
#  pull_request:
  workflow_dispatch:
  workflow_call:

jobs:
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: flutter-actions/setup-flutter@v4
        with:
          channel: stable
          version: latest

      - name: Install Linux dependencies (Debian)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            ninja-build \
            pkg-config \
            libgtk-3-dev \
            liblzma-dev \
            libappindicator3-dev \
            file

      - name: Install dependencies
        run: |
          flutter pub get
          dart pub global activate fastforge

      - name: Build DEB package
        run: |
          export PATH="$PATH:$HOME/.pub-cache/bin"
          fastforge package --platform linux --targets deb

      - name: Build RPM package in AlmaLinux 8
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -w /app \
            -e HOME=/root \
            almalinux:8 \
            /bin/bash -c " \
              # Enable EPEL and PowerTools (required for ninja-build and libappindicator)
              dnf install -y epel-release && \
              dnf install -y 'dnf-command(config-manager)' && \
              dnf config-manager --set-enabled powertools && \
              
              # Install dependencies
              dnf install -y clang cmake ninja-build pkg-config gtk3-devel xz-devel libappindicator-gtk3-devel rpm-build git unzip libstdc++-devel mesa-libGLU-devel libX11-devel tar xz which && \
              
              # Install Flutter
              curl -o /tmp/flutter.tar.xz https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_3.41.4-stable.tar.xz && \
              mkdir -p /opt && tar -xf /tmp/flutter.tar.xz -C /opt && rm /tmp/flutter.tar.xz && \
              export PATH=\$PATH:/opt/flutter/bin && \
              git config --global --add safe.directory /opt/flutter && \
              
              # Install fastforge
              flutter pub global activate fastforge && \
              export PATH=\$PATH:/root/.pub-cache/bin && \
              
              # Build
              flutter pub get && \
              fastforge package --platform linux --targets rpm \
            "

      - name: Prepare and rename artifacts
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | cut -d ' ' -f 2)
          mkdir deploy_out
          
          # DEB
          DEB_FILE=$(find dist/ -name "*.deb" | head -n 1)
          if [ -f "$DEB_FILE" ]; then
            cp "$DEB_FILE" "deploy_out/flutter-client-$VERSION.deb"
          fi
          
          # RPM
          RPM_FILE=$(find dist/ -name "*.rpm" | head -n 1)
          if [ -f "$RPM_FILE" ]; then
            cp "$RPM_FILE" "deploy_out/flutter-client-$VERSION.rpm"
          fi

      - name: Upload to CDN via FTP
        uses: sand4rt/ftp-deployer@v1.8
        with:
          host: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USERNAME }}
          password: ${{ secrets.SFTP_PASSWORD }}
          local_folder: deploy_out/
          remote_folder: flutter/linux/
          cleanup: false

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: deploy_out/*