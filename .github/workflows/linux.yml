name: Linux Build

on:
#  push:
#    branches: [ main ]
#  pull_request:
  workflow_dispatch:
  workflow_call:

jobs:
  build-deb:
    name: Build DEB
    runs-on: ubuntu-latest
    container:
      image: ubuntu:20.04
    steps:
      - name: Install core tools
        run: |
          apt-get update
          apt-get install -y curl git tar xz-utils libglu1-mesa file
          
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Linux dependencies (Ubuntu)
        run: |
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y \
            clang \
            cmake \
            ninja-build \
            pkg-config \
            libgtk-3-dev \
            liblzma-dev \
            libappindicator3-dev \
            libnss3-dev \
            libnspr4-dev \
            libasound2-dev \
            xclip \
            sudo

      - name: Install Flutter
        run: |
          curl -o /tmp/flutter.tar.xz https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_3.41.4-stable.tar.xz
          mkdir -p /opt
          tar -xf /tmp/flutter.tar.xz -C /opt
          rm /tmp/flutter.tar.xz
          git config --global --add safe.directory /opt/flutter
          echo "/opt/flutter/bin" >> $GITHUB_PATH

      - name: Build DEB package
        run: |
          export PATH="$PATH:/opt/flutter/bin"
          /opt/flutter/bin/dart pub global activate fastforge
          
          /opt/flutter/bin/flutter pub get
          /opt/flutter/bin/dart pub global run fastforge:main package --platform linux --targets deb

      - name: Upload DEB artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: dist/*/*.deb

      - name: Prepare and rename DEB
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | cut -d ' ' -f 2)
          mkdir -p deploy_out
          DEB_FILE=$(find dist/ -name "*.deb" | head -n 1)
          if [ -f "$DEB_FILE" ]; then
            cp "$DEB_FILE" "deploy_out/flutter-client-$VERSION.deb"
          fi

      - name: Upload DEB to CDN via FTP
        uses: sand4rt/ftp-deployer@v1.8
        with:
          host: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USERNAME }}
          password: ${{ secrets.SFTP_PASSWORD }}
          local_folder: deploy_out/
          remote_folder: flutter/linux/
          cleanup: false

  build-rpm:
    name: Build RPM
    runs-on: ubuntu-latest
    container:
      image: almalinux:8
    steps:
      - name: Install core tools
        run: dnf install -y git tar xz which curl

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Enable EPEL and PowerTools
        run: |
          dnf install -y epel-release
          dnf install -y 'dnf-command(config-manager)'
          dnf config-manager --set-enabled powertools

      - name: Install build dependencies
        run: |
          dnf install -y \
            clang \
            cmake \
            ninja-build \
            pkg-config \
            gtk3-devel \
            xz-devel \
            libappindicator-gtk3-devel \
            rpm-build \
            unzip \
            libstdc++-devel \
            mesa-libGLU-devel \
            libX11-devel \
            nss-devel \
            nspr-devel \
            alsa-lib-devel \
            xclip

      - name: Install Flutter
        run: |
          curl -o /tmp/flutter.tar.xz https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_3.41.4-stable.tar.xz
          mkdir -p /opt
          tar -xf /tmp/flutter.tar.xz -C /opt
          rm /tmp/flutter.tar.xz
          git config --global --add safe.directory /opt/flutter
          echo "/opt/flutter/bin" >> $GITHUB_PATH

      - name: Build RPM package
        run: |
          # Configure RPM build to ignore internal shared libraries
          echo '%__requires_exclude ^lib(flutter_.*|printing_plugin|webview_cef_plugin|cef)\\.so.*' > /root/.rpmmacros
          
          export PATH="$PATH:/opt/flutter/bin"
          /opt/flutter/bin/dart pub global activate fastforge
          
          /opt/flutter/bin/flutter pub get
          /opt/flutter/bin/dart pub global run fastforge:main package --platform linux --targets rpm

      - name: Upload RPM artifact
        uses: actions/upload-artifact@v4
        with:
          name: rpm-package
          path: dist/*/*.rpm

      - name: Prepare and rename RPM
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | cut -d ' ' -f 2)
          mkdir -p deploy_out
          RPM_FILE=$(find dist/ -name "*.rpm" | head -n 1)
          if [ -f "$RPM_FILE" ]; then
            cp "$RPM_FILE" "deploy_out/flutter-client-$VERSION.rpm"
          fi

      - name: Upload RPM to CDN via FTP
        uses: sand4rt/ftp-deployer@v1.8
        with:
          host: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USERNAME }}
          password: ${{ secrets.SFTP_PASSWORD }}
          local_folder: deploy_out/
          remote_folder: flutter/linux/
          cleanup: false

