name: lsf_webview_linux
description: Linux implementation of webview_cef
version: 0.0.1
publish_to: 'none'

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.3.0"

dependencies:
  flutter:
    sdk: flutter
  webview_cef: ^0.2.2

flutter:
  plugin:
    platforms:
      linux:
        pluginClass: LsfWebviewLinux
